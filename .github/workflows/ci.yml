name: CI

on:
  push:
    branches: [main, master]
  pull_request:

jobs:
  backend:
    name: Backend (lint + test)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: core
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Install dependencies
        run: pip install -e ".[dev]"
      - name: Lint (ruff)
        run: ruff check app tests
      - name: Type-check (mypy)
        run: mypy app --ignore-missing-imports
        continue-on-error: true
      - name: Test (pytest)
        run: pytest -q

  frontend:
    name: Frontend (lint + typecheck + test)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: shell/ui
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: shell/ui/package-lock.json
      - name: Install dependencies
        run: npm ci
      - name: Lint (oxlint)
        run: npm run lint
      - name: Type-check
        run: npx tsc -b
      - name: Test (vitest)
        run: npm run test

  tauri-check:
    name: Tauri shell (cargo check)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: shell/src-tauri
    steps:
      - uses: actions/checkout@v4
      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y libwebkit2gtk-4.1-dev libappindicator3-dev librsvg2-dev patchelf
      - uses: dtolnay/rust-toolchain@stable
      - name: Create placeholder sidecar binary
        # bundle.externalBin in tauri.conf.json makes tauri-build require this
        # exact path to exist for *any* cargo build/check, on every target
        # triple -- including this CI runner's, which never produces one
        # since the real sidecar is only ever built for Windows (via
        # build.bat + PyInstaller, kept local, not committed). `cargo check`
        # never executes the binary, it only needs the path to resolve, so
        # an empty placeholder is enough.
        run: |
          mkdir -p binaries
          touch binaries/core-x86_64-unknown-linux-gnu
          chmod +x binaries/core-x86_64-unknown-linux-gnu
      - name: cargo check
        run: cargo check
